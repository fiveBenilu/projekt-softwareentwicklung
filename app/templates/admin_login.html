{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title mb-3"><i class="fa-solid fa-user-lock"></i> Admin Login</h3>
                <p class="text-muted">Nur autorisierte Administratoren haben Zugriff auf diesen Bereich.</p>
                <form method="POST" class="mt-4">
                    <div class="mb-3">
                        <label class="form-label">Benutzername</label>
                        <input type="text" class="form-control" name="username" placeholder="Admin-Benutzername" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Passwort</label>
                        <input type="password" class="form-control" name="password" placeholder="Passwort" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket"></i> Anmelden</button>
                </form>
                {% if not admins_exist %}
                <div class="text-center mt-4">
                    <p class="text-muted mb-2">Noch kein Admin-Konto vorhanden?</p>
                    <a href="{{ url_for('auth.register') }}" class="btn btn-outline-secondary btn-sm">Erstes Admin-Konto anlegen</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
