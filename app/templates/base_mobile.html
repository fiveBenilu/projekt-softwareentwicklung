<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Cafe Antares" }}</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='style_mobile.css') }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Patrick+Hand&display=swap">
</head>
<body class="bg-light">
  
  <!-- Modern Navigation Bar -->
  <nav class="navbar navbar-expand bg-white fixed-top shadow-sm py-2 px-3">
    <div class="d-flex w-100 justify-content-between align-items-center">
      <a class="nav-link fs-4 text-dark" href="{% if tisch_id %}{{ url_for('tisch.tisch', tisch_id=tisch_id) }}{% else %}#{% endif %}"><i class="fa-solid fa-home"></i></a>
      
      <div class="text-center branding">
        <div class="fw-bold fs-5 text-dark" style="font-family: 'Poppins', sans-serif;">Cafe Antares</div>
        {% if tisch_id %}
        <div class="text-muted small">Tisch {{ tisch_id }}</div>
        {% endif %}
      </div>
      
      <a class="nav-link fs-4 text-primary position-relative" href="{% if tisch_id %}{{ url_for('tisch.warenkorb_ansehen', tisch_id=tisch_id) }}{% else %}#{% endif %}">
        <i class="fa-solid fa-cart-shopping"></i>
        <!-- Optional cart badge implementation -->
        <span class="position-absolute top-25 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" style="width: 10px; height: 10px;">
          <span class="visually-hidden">Warenkorb füllen</span>
        </span>
      </a>
    </div>
  </nav>

  <!-- Main Content Area (Spaced for fixed topnav) -->
  <main class="container-fluid pt-5 mt-4 pb-5" style="max-width: 600px;">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
