<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Produkt bearbeiten</title>
</head>
<body>
    <h2>✏️ Produkt bearbeiten</h2>
    <form method="POST">
        <label>Name:</label>
        <input type="text" name="name" value="{{ produkt.name }}" required><br>
    
        <label>Preis (€):</label>
        <input type="number" step="0.01" name="preis" value="{{ produkt.preis }}" required><br>
    
        <label>Beschreibung:</label>
        <textarea name="beschreibung">{{ produkt.beschreibung }}</textarea><br>
    
        <label>Kategorie:</label>
        <input type="text" name="kategorie" value="{{ produkt.kategorie }}" required><br>
    
        <button type="submit">Änderungen speichern</button>
    </form>
    
    <p><a href="{{ url_for('admin.menu') }}">🔙 Zurück zur Speisekarte</a></p>
</body>
</html>
