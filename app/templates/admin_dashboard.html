{% extends "base.html" %}

{% block title %}Produkt bearbeiten{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h2 class="fw-bold"><i class="fa-solid fa-pen-to-square text-primary"></i> Produkt bearbeiten</h2>
        <p class="text-muted">Ändern Sie die Eigenschaften von "{{ produkt.name }}".</p>
    </div>
    <div class="col-md-4 text-md-end">
        <a href="{{ url_for('admin.menu') }}" class="btn btn-secondary mt-3"><i class="fa-solid fa-arrow-left"></i> Zurück</a>
    </div>
</div>

<div class="card shadow-sm border-0" style="max-width: 600px;">
    <div class="card-body bg-light rounded m-3">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Name</label>
                <input type="text" class="form-control" name="name" value="{{ produkt.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Preis (€)</label>
                <input type="number" step="0.01" class="form-control" name="preis" value="{{ produkt.preis }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Beschreibung</label>
                <textarea class="form-control" name="beschreibung" rows="3">{{ produkt.beschreibung }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Kategorie</label>
                <input type="text" class="form-control" name="kategorie" value="{{ produkt.kategorie }}" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Änderungen speichern</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
