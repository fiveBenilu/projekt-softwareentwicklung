{% extends "base.html" %}

{% block title %}Thekenübersicht{% endblock %}

{% block content %}
<style>
    .tisch-card {
        transition: transform 0.2s;
        position: relative;
    }
    .tisch-card:hover {
        transform: translateY(-5px);
    }
    .tisch-img-wrapper {
        position: relative;
        text-align: center;
        padding: 10px;
    }
    .tisch-img-wrapper img {
        max-width: 100%;
        height: auto;
    }
    .tisch-status-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2.5rem;
        color: #ffffff;
        background: white;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        z-index: 10;
        transition: all 0.2s ease;
    }
    .tisch-status-icon:hover {
        transform: translate(-50%, -50%) scale(1.1);
    }
    .status-offen {
        background: #f59e0b;
    }
    .status-frei {
        background: #22c55e;
    }
    .tisch-link {
        text-decoration: none;
        color: inherit;
        display: block;
        height: 100%;
    }
    .tisch-alert-dot {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #ef4444;
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        box-shadow: 0 4px 10px rgba(239, 68, 68, 0.45);
        z-index: 12;
    }
    .tisch-alert-dot.active {
        display: flex;
    }
    .todo-list-container {
        max-height: calc(100vh - 120px);
        overflow-y: auto;
    }
</style>

<div class="row h-100">
    <!-- Main Map Area -->
    <div class="col-lg-8 col-md-7 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="fa-solid fa-bell-concierge text-primary"></i> Tisch-Übersicht</h2>
            <span class="badge bg-success p-2">Live Update <i class="fa-solid fa-circle-play fa-fade ms-1"></i></span>
        </div>

        <div class="row g-4" id="tischGrid">
            {% for tisch_id in range(1, anzahl_tische + 1) %}
            <div class="col-6 col-sm-6 col-md-4 col-xl-3 tisch" data-id="{{ tisch_id }}">
                <div class="card tisch-card shadow-sm border-0 h-100 bg-white">
                    <a href="{{ url_for('theke.rechnung_ansehen', tisch_id=tisch_id) }}" class="tisch-link" title="Rechnung fuer Tisch {{ tisch_id }}">
                        <div class="tisch-img-wrapper">
                            <img src="{{ url_for('static', filename='img/tisch.png') }}" class="img-fluid" alt="Tisch {{ tisch_id }}">
                            <div class="tisch-status-icon status-frei"><i class="fa-solid fa-circle-check"></i></div>
                            <div class="tisch-alert-dot" title="Offene Anforderung"><i class="fa-solid fa-exclamation"></i></div>
                        </div>
                        <div class="card-footer bg-light border-0 text-center fw-bold text-dark rounded-bottom d-flex justify-content-center align-items-center gap-2">
                            <span>Tisch {{ tisch_id }}</span>
                            <i class="fa-solid fa-file-invoice-dollar text-success"></i>
                        </div>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Sidebar ToDos -->
    <div class="col-lg-4 col-md-5">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-header bg-dark text-white pt-3 pb-2 rounded-top">
                <h5 class="fw-bold mb-0"><i class="fa-solid fa-list-check"></i> Anfragen & Aufgaben</h5>
            </div>
            <div class="card-body bg-light todo-list-container p-0">
                <ul class="list-group list-group-flush" id="todo-liste">
                    <!-- Wird dynamisch befüllt -->
                    <li class="list-group-item text-muted text-center py-4">Lade Einträge...</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<audio id="benachrichtigungston" src="{{ url_for('static', filename='sounds/ping.mp3') }}" preload="auto"></audio>

<script>
    let letzteDatenStr = "{}";

    function aktualisiereAnzeige() {
        fetch("/theke/api/bestellungen")
            .then(res => res.json())
            .then(daten => {
                const datenString = JSON.stringify(daten);
                
                // Audio bei Änderungen abspielen
                if (datenString !== letzteDatenStr && letzteDatenStr !== "{}") {
                    const audio = document.getElementById("benachrichtigungston");
                    if (audio) {
                        try {
                            audio.play().catch(e => console.log("Audio-Playback blockiert", e));
                        } catch (e) {}
                    }
                }
                letzteDatenStr = datenString;
        
                // 1. To-Do-Liste aktualisieren
                const todoContainer = document.getElementById("todo-liste");
                todoContainer.innerHTML = "";
                
                let hasItems = false;
        
                for (const [tisch_id, eintraege] of Object.entries(daten)) {
                    const hatBestellungen = eintraege.some((e) => e.aktion === 'bestellung');

                    if (hatBestellungen) {
                        const liRechnung = document.createElement("li");
                        liRechnung.className = "list-group-item d-flex justify-content-between align-items-center p-3 bg-white";
                        liRechnung.innerHTML = `
                            <div>
                                <div class="fw-bold mb-1">Tisch ${tisch_id} <span class="badge bg-success ms-2">Rechnung moeglich</span></div>
                                <div class="text-muted small">Bestellungen erfasst - Rechnung kann erstellt werden.</div>
                            </div>
                            <a href="/theke/rechnung/${tisch_id}" class="btn btn-success btn-sm">
                                <i class="fa-solid fa-file-invoice-dollar"></i> Rechnung
                            </a>
                        `;
                        todoContainer.appendChild(liRechnung);
                    }

                    eintraege.forEach((eintrag) => {
                        if (eintrag.aktion === 'bestellung_erfasst') {
                            return;
                        }

                        hasItems = true;
                        
                        let badgeColor = 'bg-secondary';
                        let aktionText = eintrag.aktion;
                        if(eintrag.aktion === 'bestellung') { badgeColor = 'bg-primary'; aktionText = "Bestellung"; }
                        else if(eintrag.aktion === 'hilfe') { badgeColor = 'bg-warning text-dark'; aktionText = "Hilfe gerufen"; }
                        else if(eintrag.aktion === 'rechnung') { badgeColor = 'bg-success'; aktionText = "Rechnung"; }

                        const li = document.createElement("li");
                        li.className = "list-group-item d-flex justify-content-between align-items-center p-3";
                        const erledigtButton = `<form action="/theke/erledigt/${eintrag.id}" method="POST" class="m-0">
                                <button type="submit" class="btn btn-outline-success btn-sm rounded-circle" title="Erledigt" style="width: 38px; height: 38px;">
                                    <i class="fa-solid fa-check"></i>
                                </button>
                           </form>`;

                        li.innerHTML = `
                            <div>
                                <div class="fw-bold mb-1">Tisch ${tisch_id} <span class="badge ${badgeColor} ms-2">${aktionText}</span></div>
                                <div class="text-muted small"><i class="fa-regular fa-clock"></i> ${eintrag.zeit}</div>
                            </div>
                            ${erledigtButton}
                        `;
                        todoContainer.appendChild(li);
                    });
                }
                
                if (!hasItems) {
                    todoContainer.innerHTML = '<li class="list-group-item text-muted text-center py-4 bg-light"><i class="fa-solid fa-mug-hot fa-2x mb-3 text-black-50"></i><br>Keine offenen Aufgaben</li>';
                }
        
                // 2. Icons bei Tischen aktualisieren
                const tischAnzahl = {{ anzahl_tische | int }};
                for (let i = 1; i <= tischAnzahl; i++) {
                    const tischDiv = document.querySelector(`.tisch[data-id="${i}"]`);
                    if (!tischDiv) continue;
        
                    const statusIcon = tischDiv.querySelector(".tisch-status-icon");
                    const alertDot = tischDiv.querySelector(".tisch-alert-dot");
                    if (!statusIcon) continue;

                    const eintraege = daten[i] || [];
                    const hatOffenePosten = eintraege.some((e) => e.aktion === 'bestellung' || e.aktion === 'bestellung_erfasst');
                    const hatOffeneAnforderung = eintraege.some((e) => e.aktion === 'bestellung' || e.aktion === 'hilfe' || e.aktion === 'rechnung');

                    if (alertDot) {
                        alertDot.classList.toggle('active', hatOffeneAnforderung);
                    }

                    if (hatOffenePosten) {
                        statusIcon.classList.remove("status-frei");
                        statusIcon.classList.add("status-offen");
                        statusIcon.innerHTML = '<i class="fa-solid fa-receipt"></i>';
                        statusIcon.title = "Offene Posten vorhanden";
                    } else {
                        statusIcon.classList.remove("status-offen");
                        statusIcon.classList.add("status-frei");
                        statusIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                        statusIcon.title = "Tisch frei";
                    }
                }
            })
            .catch(err => console.error("Fehler beim Aktualisieren:", err));
    }

    // Interval für Live-Updates
    setInterval(aktualisiereAnzeige, 3000);
    window.onload = aktualisiereAnzeige;
</script>
{% endblock %}
