{% extends "base_mobile.html" %}

{% block content %}
<div class="text-center mb-4">
    <div class="d-inline-flex bg-primary text-white rounded-circle align-items-center justify-content-center shadow-sm mb-3" style="width: 80px; height: 80px;">
        <i class="fa-solid fa-chair fs-1"></i>
    </div>
    <h2 class="fw-bold" style="font-family: 'Poppins', sans-serif;">Tisch {{ tisch_id }}</h2>
    <p class="text-muted">Wie können wir helfen?</p>
</div>

<div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-bell-concierge text-primary"></i> Bestellung aufgeben</h5>
        <form method="POST" action="{{ url_for('tisch.bestellen', tisch_id=tisch_id) }}">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">PRODUKT</label>
                <input type="text" class="form-control form-control-lg bg-light border-0" name="artikel" placeholder="Was möchtest du trinken/essen?" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">MENGE</label>
                <input type="number" class="form-control form-control-lg bg-light border-0" name="menge" value="1" min="1">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm">
                <i class="fa-solid fa-paper-plane me-2"></i> Bestellung senden
            </button>
        </form>
    </div>
</div>

<div class="row g-3">
    <div class="col-6">
        <form method="POST" action="{{ url_for('tisch.hilfe', tisch_id=tisch_id) }}" class="h-100">
            <button type="submit" class="btn btn-warning w-100 h-100 py-3 rounded-4 border-0 shadow-sm text-dark d-flex flex-column align-items-center justify-content-center">
                <i class="fa-solid fa-hand-sparkles fs-2 mb-2"></i>
                <span class="fw-bold fs-6">Kellner rufen</span>
            </button>
        </form>
    </div>
    <div class="col-6">
        <form method="POST" action="{{ url_for('tisch.rechnung', tisch_id=tisch_id) }}" class="h-100">
            <button type="submit" class="btn btn-success w-100 h-100 py-3 rounded-4 border-0 shadow-sm text-white d-flex flex-column align-items-center justify-content-center">
                <i class="fa-solid fa-file-invoice-dollar fs-2 mb-2"></i>
                <span class="fw-bold fs-6">Rechnung</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
