<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Cafe Admin{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }
        .sidebar {
            width: 200px;
            background: black;
            color: white;
            height: 100vh;
            float: left;
            padding: 20px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin: 10px 0;
        }
        .content {
            margin-left: 220px;
            padding: 30px;
        }
        .qrcode {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Admin</h3>
        <ul>
            <li><a href="{{ url_for('home.home') }}" style="color:white;">Startseite</a></li>
            <li><a href="{{ url_for('admin.qrcodes') }}" style="color:white;">QR Codes</a></li>
            <li><a href="{{ url_for('admin.setup') }}" style="color:white;">Setup</a></li>
            <li><a href="#" style="color:white;">Statistik</a></li>
            <li><a href="{{ url_for('admin.menu') }}" style="color:white;">Speisekarte</a></li>
            <li><a href="{{ url_for('admin.show_layout_editor') }}">🪑 Tischlayout bearbeiten</a></li>
        </ul>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
