<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cafe Admin{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        #sidebar {
            min-height: 100vh;
            background: #212529;
            color: #fff;
            transition: all 0.3s;
            position: fixed;
            width: 250px;
            z-index: 1000;
        }
        #sidebar .sidebar-header {
            padding: 20px;
            background: #1a1e21;
            text-align: center;
        }
        #sidebar ul.components {
            padding: 20px 0;
        }
        #sidebar ul li a {
            padding: 10px 20px;
            font-size: 1.1em;
            display: block;
            color: #fff;
            text-decoration: none;
            transition: background 0.2s;
        }
        #sidebar ul li a:hover, #sidebar ul li.active > a {
            background: #0d6efd;
        }
        #sidebar ul li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        #content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            transition: all 0.3s;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .qrcode {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            #sidebar {
                margin-left: -250px;
            }
            #sidebar.active {
                margin-left: 0;
            }
            #content {
                margin-left: 0;
                width: 100%;
            }
            #content.active {
                margin-left: 250px;
                width: calc(100% - 250px);
            }
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header border-bottom border-secondary">
                <h4 class="mb-0"><i class="fa-solid fa-mug-hot"></i> Cafe Admin</h4>
            </div>
            <ul class="list-unstyled components">
                <li>
                    <a href="{{ url_for('home.home') }}"><i class="fa-solid fa-house"></i> Startseite</a>
                </li>
                <li>
                    <a href="{{ url_for('admin.qrcodes') }}"><i class="fa-solid fa-qrcode"></i> QR Codes</a>
                </li>
                <li>
                    <a href="{{ url_for('main.setup') }}"><i class="fa-solid fa-cogs"></i> Setup</a>
                </li>
                <li>
                    <a href="#"><i class="fa-solid fa-chart-line"></i> Statistik</a>
                </li>
                <li>
                    <a href="{{ url_for('admin.menu') }}"><i class="fa-solid fa-utensils"></i> Speisekarte</a>
                </li>
                <li>
                    <a href="{{ url_for('admin.show_layout_editor') }}"><i class="fa-solid fa-border-all"></i> Tischlayout</a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white rounded mb-4 shadow-sm">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-primary d-md-none">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="ms-auto">
                        <span class="text-muted"><i class="fa-solid fa-user-circle"></i> Administrator</span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('content');
            const sidebarBtn = document.getElementById('sidebarCollapse');
            
            if (sidebarBtn) {
                sidebarBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('active');
                    content.classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
